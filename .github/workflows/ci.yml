name: CI

on:
  push:
    branches: [ main, master ]
  pull_request:

jobs:
  build-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0   # volle Historie für MinVer

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Restore
        run: dotnet restore Checkmk.slnx

      - name: Build
        run: dotnet build Checkmk.slnx -c Release --no-restore

      - name: Test
        run: dotnet test Checkmk.slnx -c Release --no-build --verbosity normal
