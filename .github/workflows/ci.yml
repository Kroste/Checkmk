name: CI

on:
  push:
    branches: [ main, master ]
  pull_request:

jobs:
  build-test:
    # Windows-Runner, seit die App auf net10.0-windows single-target ist
    # und die Tests App-Klassen referenzieren.
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0   # volle Historie für MinVer

      - uses: actions/setup-dotnet@v6
        with:
          dotnet-version: '10.0.x'

      - name: NuGet-Cache
        uses: actions/cache@v4
        with:
          path: ~/.nuget/packages
          key: nuget-${{ runner.os }}-${{ hashFiles('**/Directory.Packages.props', '**/*.csproj') }}
          restore-keys: nuget-${{ runner.os }}-

      - name: Restore
        run: dotnet restore Checkmk.slnx

      - name: Build
        run: dotnet build Checkmk.slnx -c Release --no-restore

      - name: Test
        run: dotnet test Checkmk.slnx -c Release --no-build --verbosity normal
