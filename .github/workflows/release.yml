name: Release

on:
  push:
    tags: [ 'v*' ]

permissions:
  contents: write

jobs:
  # ---------------------------------------------------------------
  # Windows: self-contained Single-File-EXE -> ZIP
  # ---------------------------------------------------------------
  windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - uses: actions/setup-dotnet@v5
        with:
          dotnet-version: '10.0.x'

      - name: Publish (win-x64)
        run: >
          dotnet publish Checkmk.App/Checkmk.App.csproj
          -c Release -r win-x64 --self-contained
          -p:PublishSingleFile=true -p:IncludeNativeLibrariesForSelfExtract=true
          -o publish/win

      - name: Zip
        shell: pwsh
        run: |
          $ver = "${{ github.ref_name }}".TrimStart('v')
          Compress-Archive -Path publish/win/* -DestinationPath "Checkmk-$ver-win-x64.zip"

      - uses: actions/upload-artifact@v7
        with:
          name: windows
          path: Checkmk-*-win-x64.zip

  # ---------------------------------------------------------------
  # Release anlegen und Windows-ZIP anhaengen
  # ---------------------------------------------------------------
  release:
    needs: [ windows ]
    runs-on: ubuntu-latest
    steps:
      # Volle Historie fuer die Tag-Message-Extraktion (annotated tag body).
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - uses: actions/download-artifact@v8
        with:
          path: artifacts

      # Release-Body:
      #  1. RELEASE_NOTES/<tag>.md im Repo (bevorzugt, ausfuehrliche Notes)
      #  2. sonst: Message des annotated Git-Tags
      #  3. sonst: leerer Body (softprops setzt dann nur den Tag-Namen)
      - name: Prepare release notes
        run: |
          set -euo pipefail
          tag="${GITHUB_REF_NAME}"
          notes_file="RELEASE_NOTES/${tag}.md"
          if [ -f "$notes_file" ]; then
            echo "Using $notes_file"
            cp "$notes_file" release-body.md
          else
            echo "Falling back to annotated tag message of $tag"
            git tag -l --format='%(contents)' "$tag" > release-body.md
          fi
          echo "--- Release-Body ---"
          cat release-body.md

      # Debug-Hilfe fuer den naechsten Release-Bug: was liegt wirklich in artifacts/?
      - name: List downloaded artifacts
        run: find artifacts -type f | sort

      - name: GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          body_path: release-body.md
          # Rekursiver Glob — actions/download-artifact hat zwischen Major-Versionen
          # schon mal die Verzeichnisstruktur geaendert (mit/ohne <name>-Unterordner).
          # `artifacts/**/*.zip` faengt beide Faelle.
          files: |
            artifacts/**/*.zip
